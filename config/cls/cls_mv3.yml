Global:
  epoch_num: 500
  output_dir: ./output/cls_mv4
  batch_size: 64
  image_shape: [3, 224, 224]
  pretrained: 
  label_list: &label_list ['dog','cat']

Architecture:
  Backbone: 
    name: ResNet # ResNet18 #ResNet # MobileNetV3
    # model_name: small
    # scale: 0.35
  Neck:
  Head:
    name: ClsHead
    class_dim: 2

Loss:
  name: ClsLoss

Optimizer:
  name: Adam
  lr: &lr 0.001
  betas: [0.9,0.999]
  weight_decay: 1e-5
  amsgrad: False
  weight_decay: 0.0001

LRScheduler:
  name: LinearLR #CosineAnnealingLR
  lr: *lr 
  warmup_epoch: -2
  warpup_init_lr: 0.0001
  warpup_target_lr: *lr



PostProcess:
  name: ClsPostProcess
  label_list: *label_list

#
Metric:
  name: ClsMetric
  main_indicator: acc
  # eval_batch_size: 12


Train:
  dataset:
    name: SimpleDataSet
    data_dir: ./train_data/cls/cat_dog
    label_file_list:
      - ./train_data/cls/train_list.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: False
      - ClsLabelEncode: 
          label_list: *label_list # Class handling label
      - BaseDataAugmentation:
      - RandAugment:
      - ClsResizeImg:  
          image_shape: [3, 224, 224]
      - KeepKeys:
          keep_keys: ['image', 'label'] # dataloader will return list in this order
  loader:
    shuffle: True
    drop_last: True
    batch_size: 12
    num_workers: 0

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ./train_data/cls/cat_dog
    label_file_list:
      - ./train_data/cls/val_list.txt
    transforms:
      - DecodeImage: # load image
          img_mode: BGR
          channel_first: False
      - ClsLabelEncode: # Class handling label
          label_list: *label_list 
      - ClsResizeImg:
          image_shape: [3, 224, 224]
      - KeepKeys:
          keep_keys: ['image', 'label'] # dataloader will return list in this order
  loader:
    shuffle: False
    drop_last: False
    batch_size: 12
    num_workers: 0