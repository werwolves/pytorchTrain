Global:
  epoch_num: 500
  output_dir: ./output/ser_mv3
  batch_size: 64
  image_shape: [3, 224, 224]
  pretrained: 
  label_list: &label_list ['TITLE','AUTHOR','PUBLIC','CALL_NO','LIB_NAME','OTHER-1']

Architecture:
  Backbone: 
    name: LayoutLMV3_zh # ResNet18 #ResNet # MobileNetV3
    num_labels: 13
    # model_name: small
    # scale: 0.35
  Neck:
  Head:
    # name: ClsHead
    # class_dim: 2

Loss:
  name: ClsLoss

Optimizer:
  name: Adam
  lr: &lr 0.001
  betas: [0.9,0.999]
  weight_decay: 1e-5
  amsgrad: False
  weight_decay: 0.0001

LRScheduler:
  name: LinearLR #CosineAnnealingLR
  lr: *lr 
  warmup_epoch: -2
  warpup_init_lr: 0.0001
  warpup_target_lr: *lr



PostProcess:
  name: ClsPostProcess
  label_list: *label_list

#
Metric:
  name: ClsMetric
  main_indicator: acc
  # eval_batch_size: 12


Train:
  dataset:
    name: SimpleDataSet
    data_dir: ./train_data/layout
    label_file_list:
      - ./train_data/layout/train.json
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: False
      - LayoutEncode_zh: 
          label_list: *label_list # Class handling label
      # - BaseDataAugmentation:
      # - RandAugment:
      # - ClsResizeImg:  
      #     image_shape: [3, 224, 224]
      - KeepKeys:
          keep_keys: ['input_ids', 'bbox', 'attention_mask','image','labels'] # dataloader will return list in this order
  loader:
    shuffle: True
    drop_last: True
    batch_size: 16
    num_workers: 0

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ./train_data/layout
    label_file_list:
      - ./train_data/layout/val.json
    transforms:
      - DecodeImage: # load image
          img_mode: BGR
          channel_first: False
      - LayoutEncode_zh: # Class handling label
          label_list: *label_list 
          max_seq_len: 512
      # - ClsResizeImg:
      #     image_shape: [3, 224, 224]
      - KeepKeys:
          keep_keys: ['input_ids', 'bbox', 'attention_mask','image','labels'] # dataloader will return list in this order
  loader:
    shuffle: False
    drop_last: False
    batch_size: 16
    num_workers: 0